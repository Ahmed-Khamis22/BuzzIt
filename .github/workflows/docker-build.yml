name: Deploy BuzzIt Backend to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: SSH into EC2, Build & Redeploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "==> Navigating to project directory..."
            cd ~/BuzzIt/buzzit-server

            echo "==> Pulling latest code from GitHub..."
            git pull origin master

            echo "==> Building new Docker image..."
            docker build -t buzzit-backend:latest .

            echo "==> Stopping old container (if running)..."
            docker stop buzzit-backend-container || true
            docker rm buzzit-backend-container || true

            echo "==> Starting new container..."
            docker run -d \
              --name buzzit-backend-container \
              --restart unless-stopped \
              -p 4000:4000 \
              --env-file .env \
              buzzit-backend:latest

            echo "==> Cleaning up old Docker images..."
            docker image prune -f

            echo "==> Deployment complete!"
